Name = "dropship-automation-backend"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
MARKUP_PERCENT = "40"
STORE_ORIGIN = "https://azaan0000.github.io"
WORKER_ORIGIN = "https://dropship-worker.azaanbk30.workers.dev"
STORE_NAME = "Drift Store"
RAPIDGATEWAY_API_BASE = "https://secure.rapid-gateway.com"
RAPIDGATEWAY_MERCHANT_ID = "576"

# KV namespace for caching CJ access tokens
# Create it first: wrangler kv namespace create TOKEN_STORE
# Then paste the returned id below
[[kv_namespaces]]
binding = "TOKEN_STORE"
id = "12f8ef7b121d4073bde05128fd597edc"

# Secret (do NOT put here) - set via terminal instead:
# wrangler secret put CJ_API_KEY
